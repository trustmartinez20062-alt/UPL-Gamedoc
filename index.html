<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Game Doctor" />
    <meta name="robots" content="index, follow" />

    <!-- @SEO Metadata fallback for static crawlers -->
    <title>Reparación y Venta de Consolas en Montevideo | Game Doctor</title>
    <meta name="description" content="Servicio técnico especializado en consolas PlayStation, Xbox y Nintendo en Montevideo. Venta de consolas nuevas y usadas, juegos digitales y Game Pass. Garantía y confianza." />
    
    <!-- @SEO Dynamic metadata is handled via SEOHead.tsx + React Helmet -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:url" content="%VITE_SITE_URL%" />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.jpg" />
    <meta property="og:type" content="website" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta property="og:site_name" content="Game Doctor" />
    <meta property="og:locale" content="es_UY" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
